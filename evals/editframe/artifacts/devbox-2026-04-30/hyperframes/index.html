<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #061016;
        font-family: Inter, Arial, sans-serif;
      }
      #root {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: linear-gradient(135deg, #061016 0%, #0d2730 48%, #f4c15d 100%);
        color: #f9fbf7;
      }
      .stage {
        position: absolute;
        inset: 0;
        padding: 96px 120px;
        display: grid;
        grid-template-rows: 1fr auto;
      }
      .eyebrow {
        font-size: 36px;
        letter-spacing: 0;
        text-transform: uppercase;
        color: #8ee3d6;
        font-weight: 800;
      }
      .headline {
        margin-top: 28px;
        font-size: 132px;
        line-height: 0.92;
        font-weight: 900;
        max-width: 1120px;
      }
      .metric {
        position: absolute;
        right: 120px;
        top: 150px;
        width: 520px;
        height: 520px;
        border: 4px solid rgba(255, 255, 255, 0.75);
        border-radius: 24px;
        padding: 56px;
        background: rgba(5, 14, 18, 0.54);
      }
      .metric-value {
        font-size: 120px;
        font-weight: 900;
        color: #f4c15d;
      }
      .metric-label {
        margin-top: 24px;
        font-size: 34px;
        color: #dce8e5;
      }
      .cta {
        align-self: end;
        display: inline-flex;
        width: max-content;
        padding: 26px 38px;
        background: #061016;
        color: #f9fbf7;
        border: 3px solid #8ee3d6;
        border-radius: 8px;
        font-size: 42px;
        font-weight: 900;
      }
      .marker {
        position: absolute;
        left: 120px;
        bottom: 240px;
        width: 720px;
        height: 8px;
        background: #8ee3d6;
        transform-origin: left center;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="10"
      data-width="1920"
      data-height="1080"
    >
      <div class="stage">
        <div>
          <div id="logo" class="eyebrow">Devbox Eval</div>
          <div id="headline" class="headline">Precise timing without mystery state.</div>
        </div>
        <div id="cta" class="cta">Render the proof</div>
      </div>
      <div id="metric" class="metric">
        <div id="metricValue" class="metric-value">5.0s</div>
        <div class="metric-label">Chart peak target</div>
      </div>
      <div id="marker" class="marker"></div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      tl.fromTo(
        "#logo",
        { opacity: 0, y: 30 },
        { opacity: 1, y: 0, duration: 0.25, ease: "power2.out" },
        1.2,
      );
      tl.fromTo(
        "#headline",
        { opacity: 0, y: 50 },
        { opacity: 1, y: 0, duration: 0.55, ease: "power3.out" },
        1.45,
      );
      tl.fromTo(
        "#marker",
        { scaleX: 0, opacity: 0 },
        { scaleX: 1, opacity: 1, duration: 0.4, ease: "power2.out" },
        5.0,
      );
      tl.fromTo(
        "#metric",
        { opacity: 0, scale: 0.88 },
        { opacity: 1, scale: 1, duration: 0.35, ease: "back.out(1.2)" },
        5.0,
      );
      tl.fromTo(
        "#cta",
        { opacity: 0, y: 40 },
        { opacity: 1, y: 0, duration: 0.35, ease: "power2.out" },
        8.5,
      );
      tl.to("#root", { opacity: 0, duration: 0.6, ease: "power2.in" }, 9.4);
      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
