<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>scene-05-cinematic-opener</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #050507; }

    [data-composition-id="scene-05-cinematic-opener"] {
      --bg-deep: #050507;
      --ink: #f4f1ea;
      --ink-dim: #b8b3a8;
      --accent: #d97757;
      --accent-soft: #e8a888;
      --font-display: "Instrument Serif", "Times New Roman", serif;
      --font-data: "JetBrains Mono", "SF Mono", monospace;

      position: relative;
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      color: var(--ink);
      /* Deep-center gradient — feels like a darkened soundstage */
      background: radial-gradient(ellipse at center, #0c0c10 0%, #050507 70%);
    }

    /* === Soft vignette — long falloff so no oval boundary is ever visible === */
    .vignette {
      position: absolute;
      inset: -200px;
      pointer-events: none;
      z-index: 49;
      background: radial-gradient(
        ellipse at center,
        transparent 55%,
        rgba(0, 0, 0, 0.35) 85%,
        rgba(0, 0, 0, 0.6) 100%
      );
    }

    /* === Procedural film grain — two offset dot fields with overlay blend === */
    .grain {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 50;
      opacity: 0.12;
      background-image:
        radial-gradient(rgba(255, 255, 255, 0.08) 1px, transparent 1.2px),
        radial-gradient(rgba(0, 0, 0, 0.2) 1px, transparent 1.2px);
      background-size: 3px 3px, 5px 5px;
      background-position: 0 0, 1px 2px;
      mix-blend-mode: overlay;
    }

    /* === Light ball stage — centers core + halo over the full frame === */
    .ball-stage {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* The tiny luminous nucleus that will grow + fade through the frame */
    .ball-core {
      position: absolute;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: radial-gradient(
        circle,
        rgba(255, 255, 255, 1) 0%,
        rgba(255, 250, 240, 0.95) 18%,
        rgba(255, 235, 210, 0.7) 35%,
        rgba(255, 215, 175, 0.35) 55%,
        rgba(217, 119, 87, 0.12) 75%,
        rgba(217, 119, 87, 0) 100%
      );
      filter: blur(0.5px);
      opacity: 0;            /* CSS-locked — fromTo lifts in stage 1 */
      transform: scale(0.4); /* slightly larger than entry scale so blur doesn't flicker */
    }

    /* Frame-spanning warm horizon glow that the dot blooms into */
    .ball-halo {
      position: absolute;
      width: 140%;
      height: 70%;
      border-radius: 50%;
      background: radial-gradient(
        ellipse at center,
        rgba(255, 240, 220, 0.22) 0%,
        rgba(255, 215, 175, 0.12) 18%,
        rgba(217, 119, 87, 0.08) 38%,
        rgba(217, 119, 87, 0.025) 65%,
        rgba(217, 119, 87, 0) 100%
      );
      filter: blur(60px);
      opacity: 0;             /* CSS-locked — fromTo lifts during bloom */
      pointer-events: none;
    }

    /* === Title group === */
    .title-stage {
      position: absolute;
      inset: 0;
    }

    /* Horizontal beam — emerges from center via scaleX, warmed by box-shadow */
    .title-line {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 1000px;
      height: 1px;
      transform: translate(-50%, -50%) scaleX(0);  /* CSS-locked */
      transform-origin: center;
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(244, 241, 234, 0.15) 15%,
        rgba(244, 241, 234, 0.6) 50%,
        rgba(244, 241, 234, 0.15) 85%,
        transparent 100%
      );
    }

    /* The brand-mark — Instrument Serif, breathing-room letterspacing, dot separator */
    .title-headline {
      position: absolute;
      top: calc(50% - 120px);
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--font-display);
      font-weight: 400;
      font-size: 112px;
      letter-spacing: 0.04em;
      line-height: 1;
      color: var(--ink);
      white-space: nowrap;
      opacity: 0;        /* CSS-locked */
    }
    .title-headline .sep {
      color: var(--accent-soft);
      margin: 0 0.32em;
      font-size: 0.78em;
      vertical-align: 0.18em;  /* visually re-center the small dot */
    }

    /* Date / vol subtitle — monospace caps, wide tracking, dot-separated */
    .title-sub {
      position: absolute;
      top: calc(50% + 32px);
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--font-data);
      font-weight: 400;
      font-size: 16px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--ink-dim);
      white-space: nowrap;
      opacity: 0;        /* CSS-locked */
    }
    .title-sub .dot {
      display: inline-block;
      width: 4px;
      height: 4px;
      background: var(--accent);
      border-radius: 50%;
      margin: 0 14px;
      vertical-align: middle;
      transform: translateY(-1px);
    }

    /* Bottom-anchored credit line — small, muted, sets the manifesto */
    .credit {
      position: absolute;
      bottom: 88px;
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--font-data);
      font-weight: 400;
      font-size: 13px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(184, 179, 168, 0.55);
      white-space: nowrap;
      opacity: 0;        /* CSS-locked */
    }
    .credit .hl {
      color: var(--accent-soft);
    }

    /* === Corner editorial marks === */
    .corner-mark {
      position: absolute;
      font-family: var(--font-data);
      font-size: 11px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(184, 179, 168, 0.45);
      z-index: 60;
    }
    .corner-mark.tl { top: 48px; left: 64px; }
    .corner-mark.br { bottom: 48px; right: 64px; }

    /* === Scene label (library convention) === */
    .scene-label {
      position: absolute;
      left: 32px; bottom: 24px;
      font-family: "JetBrains Mono", monospace;
      font-size: 14px;
      letter-spacing: 0.06em;
      color: rgba(255, 255, 255, 0.4);
      z-index: 100;
    }
    .scene-label b { color: rgba(255, 255, 255, 0.7); }
  </style>
</head>
<body>
  <div
    id="scene-05-cinematic-opener"
    data-composition-id="scene-05-cinematic-opener"
    data-start="0"
    data-duration="6"
    data-width="1920"
    data-height="1080"
  >
    <div class="vignette"></div>
    <div class="grain"></div>

    <!-- Light ball + halo -->
    <div class="ball-stage">
      <div class="ball-halo" id="halo"></div>
      <div class="ball-core" id="core"></div>
    </div>

    <!-- Beam + title group -->
    <div class="title-stage">
      <div class="title-headline" id="headline">
        HYPER<span class="sep">&middot;</span>FRAMES
      </div>
      <div class="title-line" id="line"></div>
      <div class="title-sub" id="sub">
        VOL.1<span class="dot"></span>2026<span class="dot"></span>CINEMATIC OPENERS
      </div>
      <div class="credit" id="credit">
        This entire scene is composed from <span class="hl">divs</span> — no captured assets, no slideshow.
      </div>
    </div>

    <!-- Editorial corner marks -->
    <div class="corner-mark tl">01 &middot; OPENER</div>
    <div class="corner-mark br">1920&times;1080 &middot; 30fps</div>

    <div class="scene-label">Section 12 &middot; <b>Cinematic Opener</b> &middot; light-ball bloom into title fade-up</div>
  </div>

  <script>
    (function () {
      var BEAT = 6;
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });

      // ============================================================
      // CINEMATIC OPENER — 6 seconds, single continuous shot
      // ------------------------------------------------------------
      // 0.00–0.18s  Pinprick nucleus appears (expo.out — light snaps on)
      // 0.18–0.88s  Core grows + halo blooms simultaneously (power1.in + sine.out)
      // 0.65–1.05s  Core blows out through the frame (power2.in)
      // 0.85–1.25s  Horizontal beam emerges from center (expo.out)
      // 1.00–1.70s  Title rises above the beam (power3.out)
      // 1.30–1.90s  Vol/date subtitle settles below the beam (power2.out)
      // 2.20–2.80s  Bottom credit fades in (power2.out)
      // 3.00–5.00s  Hold — halo breathes wider/dimmer, title drifts (sine.inOut)
      // 5.40–6.00s  Quiet exit — everything fades to black together (power2.in)
      // ============================================================

      // 0.00s: tiny dot punches in — `expo.out` makes light feel like it *snaps* on,
      // not eases on. Short 0.18s window keeps the nucleus from lingering.
      tl.fromTo("#core",
        { opacity: 0, scale: 0.15 },
        { opacity: 1, scale: 0.4, duration: 0.18, ease: "expo.out" },
        0.0
      );

      // 0.18s: core grows continuously through to 0.88s. `power1.in` is gentle accel —
      // the dot picks up energy rather than launching, which sells "light building."
      tl.to("#core",
        { scale: 1.4, duration: 0.7, ease: "power1.in" },
        0.18
      );

      // 0.18s: halo blooms in lockstep with the core. `sine.out` for the glow because
      // it smooths into peak brightness without any back-snap.
      tl.fromTo("#halo",
        { opacity: 0, scale: 0.4 },
        { opacity: 1, scale: 1, duration: 0.55, ease: "sine.out" },
        0.18
      );

      // 0.65s: core blows out — scale to 8x and fade through. `power2.in` accelerates
      // hard at the end so the nucleus *vanishes into its own glow* rather than fading flat.
      tl.to("#core",
        { scale: 8, opacity: 0, duration: 0.4, ease: "power2.in" },
        0.65
      );

      // 0.65s: halo expands slightly past peak. Holds the warmth on screen while the
      // core dies — gives us a "glow remains" beat for the beam to enter into.
      tl.to("#halo",
        { scale: 1.25, opacity: 0.85, duration: 0.5, ease: "power2.out" },
        0.65
      );

      // 0.85s: beam emerges from center via scaleX. `expo.out` makes the line *fling*
      // outward — feels like a horizon being struck, not a slow draw.
      tl.to("#line",
        { scaleX: 1, duration: 0.4, ease: "expo.out" },
        0.85
      );

      // 1.00s: warm box-shadow ignites on the beam. Lit *after* the scaleX completes,
      // so the line lands first and the glow follows — two events, not one mush.
      tl.fromTo("#line",
        { boxShadow: "0 0 0px 0px rgba(255, 240, 220, 0)" },
        { boxShadow: "0 0 24px 1px rgba(255, 240, 220, 0.4)", duration: 0.4, ease: "sine.out" },
        1.0
      );

      // 1.00s: title rises above the beam. `power3.out` — long deceleration tail so the
      // headline settles slowly enough to read as a *brand moment*, not a transition.
      tl.fromTo("#headline",
        { opacity: 0, y: 14 },
        { opacity: 1, y: 0, duration: 0.7, ease: "power3.out" },
        1.0
      );

      // 1.30s: subtitle slides up under the line. `power2.out` is softer than the title's
      // power3 — supporting text deserves less drama than the brand-mark.
      tl.fromTo("#sub",
        { opacity: 0, y: 6 },
        { opacity: 1, y: 0, duration: 0.6, ease: "power2.out" },
        1.3
      );

      // 2.20s: bottom credit fades in. Late enough that the eye has finished reading the
      // title; early enough that the viewer registers the manifesto before the hold.
      tl.fromTo("#credit",
        { opacity: 0, y: 6 },
        { opacity: 1, y: 0, duration: 0.6, ease: "power2.out" },
        2.2
      );

      // 3.00–5.00s: HOLD — halo breathes wider + slightly dimmer.
      // `sine.inOut` with yoyo:1 means it expands then contracts back over 2s — one full
      // breath cycle inside the hold. Keeps the frame alive without becoming an effect.
      tl.to("#halo",
        { opacity: 0.55, scale: 1.4, duration: 1.0, ease: "sine.inOut", yoyo: true, repeat: 1 },
        3.0
      );

      // 3.00–5.00s: title drifts 3px upward and back. Sub-perceptible but breaks the
      // "frozen entrance" trap — the type stays *living* during the hold.
      tl.to("#headline",
        { y: -3, duration: 1.0, ease: "sine.inOut", yoyo: true, repeat: 1 },
        3.0
      );

      // 5.40s: everything fades together. `power2.in` so the fade accelerates at the
      // end — feels like a curtain dropping, not a slow dissolve.
      tl.to(["#headline", "#sub", "#line", "#credit", "#halo"],
        { opacity: 0, duration: 0.6, ease: "power2.in" },
        5.4
      );

      window.__timelines["scene-05-cinematic-opener"] = tl;
    })();
  </script>
</body>
</html>
